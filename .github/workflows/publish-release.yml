name: Publish Release

on:
  push:
    branches:
      - master
    tags:
    - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to create (e.g., v0.0-TEST)'
        required: true
        default: 'v0.0-TEST'
        type: string

jobs:
  build-windows-bootstrap:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: false

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x

    - name: Publish bootstrap
      working-directory: SS14.Launcher.Bootstrap
      run: dotnet publish -r win-x64

    - uses: actions/upload-artifact@v4
      with:
        name: "bootstrap"
        retention-days: 1
        path: "SS14.Launcher.Bootstrap/bin/Release/net10.0-windows/win-x64/publish/Space Station 14 Launcher.exe"

  build:
    runs-on: ubuntu-latest
    needs: build-windows-bootstrap

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        submodules: 'recursive'

    # 1. Generate Token FIRST
    - name: Generate Bot Token
      id: bot-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}

    # 2. Validate App Token Permissions
    - name: Validate App Token Permissions
      run: |
        echo "Validating App Token permissions..."
        
        # Check Read Access
        READ_RESP=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer ${{ steps.bot-token.outputs.token }}" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${{ github.repository }}")
        READ_CODE=$(echo "$READ_RESP" | tail -n1)
        
        if [ "$READ_CODE" != "200" ]; then
          echo "::error:: Read check failed (HTTP $READ_CODE). Token might be invalid or App not installed to repo."
          exit 1
        fi
        echo "Read access verified."

        # Check Write Access
        TEST_TAG="validation-check-$(date +%s)"
        
        WRITE_RESP=$(curl -s -w "\n%{http_code}" -X POST -H "Authorization: Bearer ${{ steps.bot-token.outputs.token }}" \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Content-Type: application/json" \
          -d "{\"tag_name\": \"$TEST_TAG\", \"name\": \"Validation Check\", \"body\": \"Auto-validation\", \"draft\": true, \"prerelease\": false}" \
          "https://api.github.com/repos/${{ github.repository }}/releases")
        WRITE_CODE=$(echo "$WRITE_RESP" | tail -n1)
        
        if [ "$WRITE_CODE" == "403" ]; then
          echo "::error:: Write check failed (HTTP 403)."
          echo "The App Token does not have 'contents: write' permission."
          exit 1
        elif [ "$WRITE_CODE" == "201" ] || [ "$WRITE_CODE" == "422" ]; then
          echo "Write access verified (HTTP $WRITE_CODE)."
        else
          echo "Unexpected write response: $WRITE_CODE"
        fi
        
        echo "Token validation successful. Proceeding..."
      env:
        GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}

    # 3. Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x

    - name: Create build (macOS & Linux)
      run: ./publish.py osx linux

    - name: Download Windows Bootstrap
      uses: actions/download-artifact@v4
      with:
        name: "bootstrap"

    - name: Create build (Windows)
      run: ./publish.py windows --x64-only

    # 4. Determine Tag Name (Handle both push and manual dispatch)
    - name: Determine Tag Name
      id: tag_name
      run: |
        if [ "${{ github.event_name }}" == "push" ]; then
          TAG="${{ github.ref_name }}"
        else
          TAG="${{ github.event.inputs.version }}"
        fi
        
        # Validate tag format (must start with 'v')
        if [[ ! "$TAG" =~ ^v ]]; then
          echo "::error::Tag must start with 'v'. Received: $TAG"
          exit 1
        fi
        
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Using tag: $TAG"

    # 5. Determine Release Flags (Alpha, Beta, Test, or Stable)
    - name: Determine Release Flags
      id: release_flags
      run: |
        TAG_NAME="${{ steps.tag_name.outputs.tag }}"
        TAG_LOWER=$(echo "$TAG_NAME" | tr '[:upper:]' '[:lower:]')
        
        IS_PRERELEASE="false"
        IS_DRAFT="false"
        
        if [[ "$TAG_LOWER" == *"alpha"* ]] || [[ "$TAG_LOWER" == *"beta"* ]]; then
          IS_PRERELEASE="true"
          IS_DRAFT="false"
          echo "Detected Alpha/Beta tag: $TAG_NAME -> Pre-release: Yes, Draft: No"
        elif [[ "$TAG_LOWER" == *"test"* ]]; then
          IS_PRERELEASE="true"
          IS_DRAFT="true"
          echo "Detected Test tag: $TAG_NAME -> Pre-release: Yes, Draft: Yes"
        else
          echo "Detected Stable tag: $TAG_NAME -> Pre-release: No, Draft: No"
        fi
        
        echo "prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
        echo "draft=$IS_DRAFT" >> $GITHUB_OUTPUT

    # 6. Create Release
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}
      with:
        tag_name: ${{ steps.tag_name.outputs.tag }}
        release_name: Release ${{ steps.tag_name.outputs.tag }}
        draft: ${{ steps.release_flags.outputs.draft }}
        prerelease: ${{ steps.release_flags.outputs.prerelease }}

    # Upload Linux
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./SS14.Launcher_Linux.zip
        asset_name: SS14.Launcher_Linux.zip
        asset_content_type: application/zip

    # Upload Windows
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./SS14.Launcher_Windows.zip
        asset_name: SS14.Launcher_Windows.zip
        asset_content_type: application/zip

    # Upload macOS
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./SS14.Launcher_macOS.zip
        asset_name: SS14.Launcher_macOS.zip
        asset_content_type: application/zip
